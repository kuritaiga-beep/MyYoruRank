<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyYoruRank</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="home-screen" class="container">

        <img id="artist-icon" src="assets/icon.jpg" alt="Yorushika">

        <h1>MyYoruRank</h1>

        <p class="subtitle">
            あなただけのヨルシカランキングを作ろう
        </p>

        <button id="start-button">
            START
        </button>

        <button id="check-button">データ確認</button>

        <p class="version">
            Ver.0.1
        </p>

    </div>

<div id="compare-screen" class="container" style="display:none;">

     <h2 class="compare-message">
        より好きな曲を選んでください
    </h2>
    
    <h2 id="progress-text">進捗 0%</h2>

    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>

    <div class="compare-container">

    <div class="song-card">

        <button class="song-select-button" id="left-card" type="button">

            <div class="image-container">
                <img id="left-image" src="assets/icon.jpg">
            </div>

            <h3 id="left-title">春泥棒</h3>

        </button>

        <button id="left-preview-button" class="preview-button" type="button">
            ▶ 曲を確認する
        </button>

    </div>

    <div class="song-card">

        <button class="song-select-button" id="right-card" type="button">

            <div class="image-container">
                <img id="right-image" src="assets/icon.jpg">
            </div>

            <h3 id="right-title">左右盲</h3>

        </button>

        <button id="right-preview-button" class="preview-button" type="button">
            ▶ 曲を確認する
        </button>

    </div>

</div>

    <button id="undo-button" class="undo-button" type="button" disabled>
        ← 一つ前の選択に戻る
    </button>

    <p class="youtube-note">
    ※ YouTubeボタンは公式動画が公開されている楽曲のみ表示されます。
    </p>

</div>

<div id="check-screen" class="container" style="display: none;">
    <h1>データ確認</h1>

    <div id="check-filters">
        <button class="filter-button active" data-filter="all">
            全部
        </button>

        <button class="filter-button" data-filter="mv">
            MVあり
        </button>

        <button class="filter-button" data-filter="vocal">
            ボーカル
        </button>

        <button class="filter-button" data-filter="instrumental">
            インスト
        </button>
    </div>

    <div id="check-summary">
        <p>全曲数：<span id="total-song-count">0</span>曲</p>
        <p>MVあり：<span id="mv-song-count">0</span>曲</p>
        <p>インスト：<span id="instrumental-song-count">0</span>曲</p>
        <p>画像エラー：<span id="image-error-count">0</span>件</p>
    </div>

    <div id="check-list"></div>

    <button id="back-home-button">
        ホームへ戻る
    </button>
</div>

<section id="result-screen">

    <h2>My Yoru Ranking</h2>

    <div id="ranking-list"></div>

    <button id="restart-button">もう一度ランキングする</button>

</section>

<script src="songs.js"></script>

<script src="script.js"></script>

</body>

</html>
